name: fitq_app
description: "FITQ — AI-powered outfit rating app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Networking
  dio: ^5.8.0

  # Navigation
  go_router: ^14.6.3

  # Local storage
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Media
  camera: ^0.11.1
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  flutter_image_compress: ^2.3.0

  # Share / export
  share_plus: ^10.1.4
  screenshot: ^3.0.0

  # UI / animations
  fl_chart: ^0.70.2
  lottie: ^3.3.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  pinput: ^5.0.0
  flutter_svg: ^2.0.10+1

  # Permissions
  permission_handler: ^11.4.0

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3

flutter_native_splash:
  color: "#080808"
  color_dark: "#080808"
  android_12:
    color: "#080808"
    color_dark: "#080808"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/SpaceGrotesk/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk/SpaceGrotesk-Bold.ttf
          weight: 700
